<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sunofriend Workbench</title>
  <style>
    :root{color-scheme:dark;--bg:#0c1118;--panel:#151e29;--panel2:#1b2734;--line:#34475a;--text:#eff6fc;--muted:#a9bac8;--gold:#ffc94a;--blue:#70c9ff;--green:#65db9a;--red:#ff8b8b}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:16px/1.45 system-ui,-apple-system,sans-serif}button,input,textarea{font:inherit}.local{position:sticky;top:0;z-index:5;background:#153927;color:#bdffd7;padding:.65rem 1.2rem;border-bottom:1px solid #2a6749;font-weight:700}.layout{display:grid;grid-template-columns:310px 1fr;min-height:calc(100vh - 45px)}aside{border-right:1px solid var(--line);padding:1.2rem;background:#101720}main{padding:1.5rem;max-width:1180px;width:100%;margin:auto}h1{font-size:2rem;margin:.2rem 0}h2{margin-top:.2rem}.muted{color:var(--muted)}.setup,.card,.controls,.preview,.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:1rem;margin:1rem 0}.review-question{border-left:4px solid var(--blue);background:#102433;padding:.8rem 1rem;margin:1rem 0;border-radius:8px}.review-question h3{margin:.1rem 0 .45rem}.review-question ul{margin:.45rem 0;padding-left:1.3rem}.steps{padding-left:1.2rem;color:var(--muted)}.steps li{margin:.65rem 0}.steps .active{color:var(--gold);font-weight:700}.stem-list{display:grid;gap:.5rem}.nav-button{display:block;width:100%;text-align:left;background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:.8rem;cursor:pointer}.nav-button.active{border-color:var(--gold)}.section-nav{margin-top:.7rem}.badge{display:inline-block;border-radius:999px;padding:.18rem .55rem;background:#26384a;color:var(--blue);font-size:.82rem}.badge.good{color:var(--green)}.progress{color:var(--gold);font-weight:700}.candidate-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem}.card{margin:0}.card.chosen{border-color:var(--green)}.card.blocked{border-color:var(--red)}audio{width:100%;margin:.6rem 0}.actions,.switcher{display:flex;flex-wrap:wrap;gap:.45rem}.actions button,.primary,.switcher button{border:1px solid #47708d;background:#234a66;color:white;border-radius:8px;padding:.55rem .7rem;cursor:pointer}.actions button:disabled,.primary:disabled{opacity:.55;cursor:not-allowed}.actions button[data-decision=reject]{background:#512f36}.actions button[data-decision=needs_correction]{background:#5a4926}.actions button.selected,.switcher button.playing{outline:3px solid var(--gold)}label{display:block;margin:.55rem 0}#role{margin-left:.5rem;padding:.45rem;background:#0f1720;color:var(--text);border:1px solid var(--line);border-radius:8px}textarea{width:100%;background:#0f1720;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:.5rem}.problems{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));font-size:.9rem}.problems label{margin:.2rem}.loop{display:flex;gap:.7rem;align-items:end;flex-wrap:wrap}.loop input{width:90px;background:#0f1720;color:var(--text);border:1px solid var(--line);padding:.4rem}.outcomes{display:flex;gap:.5rem;flex-wrap:wrap}.outcomes button{background:#26384a;color:var(--text);border:1px solid var(--line);padding:.55rem;border-radius:8px}.outcomes button.selected{outline:3px solid var(--gold)}details{margin-top:.7rem}pre{white-space:pre-wrap;overflow:auto;max-height:420px;background:#081018;padding:1rem;border-radius:8px}.notice{border-left:4px solid var(--gold);padding:.7rem 1rem;background:#2a261a}.success{border-left:4px solid var(--green);padding:.7rem 1rem;background:#162d22}.diagnostics{border-left:4px solid var(--blue);padding:.65rem .8rem;background:#111d28;margin:.7rem 0}.diagnostics.blocked{border-left-color:var(--red);background:#2a171b}.error{color:var(--red)}a{color:var(--blue)}table{width:100%;border-collapse:collapse;margin:.8rem 0}th,td{text-align:left;padding:.65rem;border-bottom:1px solid var(--line)}code{background:#081018;padding:.1rem .25rem;border-radius:4px}.busy{color:var(--gold);font-weight:700}.playhead{font-variant-numeric:tabular-nums;color:var(--gold)}
    @media(max-width:800px){.layout{grid-template-columns:1fr}aside{border-right:0;border-bottom:1px solid var(--line)}main{padding:1rem}}
  </style>
</head>
<body>
  <div class="local">● Local — audio, MIDI and private notes stay on this Mac</div>
  <div class="layout">
    <aside>
      <h1>Sunofriend</h1>
      <p class="muted">MIDI decision workbench</p>
      <ol class="steps">
        <li>Check song setup</li>
        <li id="step-parts">Choose MIDI parts</li>
        <li id="step-arrangement">Hear arrangement</li>
        <li>Choose instruments <span class="badge">later</span></li>
        <li id="step-export">Export</li>
      </ol>
      <p id="progress" class="progress">Loading…</p>
      <div id="stem-list" class="stem-list"></div>
      <button id="arrangement-nav" class="nav-button section-nav">Hear selected arrangement</button>
      <button id="export-nav" class="nav-button section-nav">GarageBand handoff</button>
      <hr>
      <p><a id="review-export" href="#">Export private review JSON</a></p>
      <button id="preview-share" class="primary">Preview possible contribution</button>
    </aside>
    <main id="main"><p>Loading local project…</p></main>
  </div>
  <script>
    const token=new URLSearchParams(location.search).get('token')||'';
    let project=null,activeStem=null,view='stem',playhead=0,currentAudio=null;
    const esc=value=>String(value??'').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    async function api(path,options={}){const join=path.includes('?')?'&':'?';const response=await fetch(path+join+'token='+encodeURIComponent(token),{...options,headers:{'Content-Type':'application/json',...(options.headers||{})}});if(!response.ok){let body={};try{body=await response.json()}catch{}throw new Error(body.error||`Request failed: ${response.status}`)}return response.json()}
    function stateFor(stem){return project.state.stems[stem.stem_id]||{candidates:{}}}
    function reviewed(stem){const state=stateFor(stem);return !!state.outcome||Object.keys(state.candidates||{}).length>0}
    function selectedRows(){const rows=[];for(const stem of project.stems){const state=stateFor(stem),main=state.main_candidate_id;for(const candidate of stem.candidates){const saved=state.candidates?.[candidate.candidate_id],decision=saved?.decision;if(!candidate.audition_blocked&&((decision==='main'&&candidate.candidate_id===main)||decision==='optional'))rows.push({stem,candidate,decision})}}return rows}
    function renderNav(){const reviewable=project.stems.filter(stem=>stem.candidate_count),done=reviewable.filter(reviewed).length;document.querySelector('#progress').textContent=`Reviewed ${done} of ${reviewable.length} stems · ${selectedRows().length} selected part${selectedRows().length===1?'':'s'}`;document.querySelector('#stem-list').innerHTML=project.stems.map(stem=>`<button class="nav-button ${view==='stem'&&activeStem===stem.stem_id?'active':''}" data-stem="${esc(stem.stem_id)}"><b>${esc(stem.role)}</b><br><span class="muted">${stem.candidate_count} candidate${stem.candidate_count===1?'':'s'} · ${stem.candidate_count?(reviewed(stem)?'decision saved':'not reviewed'):'no result yet'}</span></button>`).join('');document.querySelectorAll('[data-stem]').forEach(button=>button.onclick=()=>{view='stem';activeStem=button.dataset.stem;render()});document.querySelector('#arrangement-nav').classList.toggle('active',view==='arrangement');document.querySelector('#export-nav').classList.toggle('active',view==='export');document.querySelectorAll('.steps li').forEach(item=>item.classList.remove('active'));document.querySelector(view==='stem'?'#step-parts':view==='arrangement'?'#step-arrangement':'#step-export').classList.add('active')}
    function setupText(){const setup=project.setup;return `<section class="setup"><h2>1. Check song setup</h2><p><b>${esc(project.name)}</b></p><p>BPM: <b>${esc(setup.bpm??'not inferred')}</b> · Key: <b>${esc(setup.key??'not inferred')}</b> · Tuning: <b>${esc(setup.tuning_hz?setup.tuning_hz+' Hz':'not inferred')}</b> · Downbeat: <b>${esc(setup.downbeat??'not confirmed')}</b></p><p class="muted">Confirm these values in GarageBand. Sunofriend does not treat an unconfirmed first click as the downbeat.</p></section>`}
    function render(){stopAudio();renderNav();if(view==='arrangement'){renderArrangement();return}if(view==='export'){renderExport();return}renderStem()}
    function reviewPrompt(stem){const focus=stem.listening_focus||[];if(!stem.review_question&&!focus.length)return'';return `<section class="review-question"><h3>Listening question</h3>${stem.review_question?`<p><b>${esc(stem.review_question)}</b></p>`:''}${focus.length?`<p>Listen specifically for:</p><ul>${focus.map(item=>`<li>${esc(item)}</li>`).join('')}</ul>`:''}<p class="muted">This question guides your listening only. It does not preselect or promote a candidate.</p></section>`}
    function renderStem(){const stem=project.stems.find(item=>item.stem_id===activeStem)||project.stems[0];activeStem=stem?.stem_id;if(!stem){document.querySelector('#main').innerHTML=setupText()+'<p>No reviewable stems found.</p>';return}const state=stateFor(stem),primary=stem.candidates.filter(candidate=>candidate.primary),advanced=stem.candidates.filter(candidate=>!candidate.primary);document.querySelector('#main').innerHTML=setupText()+`<section><h2>2. Choose a MIDI part</h2><p><span class="badge">${esc(stem.role)}</span> ${esc(stem.label)}</p>${reviewPrompt(stem)}<label>What musical role do you hear?<input id="role" value="${esc(state.role||stem.role)}" maxlength="80"> <button id="save-role" class="primary">Save role</button></label><div class="controls"><h3>Synchronized source / candidate switcher</h3><p>Set a short recognisable loop, then switch between the source and candidates. Every button resumes at the same second. Current position: <span id="playhead" class="playhead">${playhead.toFixed(2)}s</span></p><div class="loop"><label>Loop start (seconds)<input id="loop-start" type="number" min="0" step="0.1" value="0"></label><label>Loop end (blank = end)<input id="loop-end" type="number" min="0" step="0.1"></label></div><div class="switcher"><button data-switch="source-audio">Source stem</button>${stem.candidates.map((candidate,index)=>candidateAudioUrl(candidate)?`<button data-switch="audio-${esc(candidate.candidate_id)}">Candidate ${String.fromCharCode(65+(index%26))}</button>`:'').join('')}<button id="stop-audio">Stop</button></div><audio id="source-audio" controls preload="metadata" src="${esc(stem.source_url)}"></audio></div>${stem.candidate_count?`<p class="notice">Judge recognisable notes, rhythm and usefulness. Neutral previews use the same local SoundFont, gain and role-based GM program for this stem; they do not alter the original MIDI. They are renderer-consistent, not peak-normalised.</p><div class="candidate-grid">${primary.map((candidate,index)=>candidateCard(candidate,index,state)).join('')}</div>${advanced.length?`<details><summary>Advanced alternatives (${advanced.length})</summary><div class="candidate-grid">${advanced.map((candidate,index)=>candidateCard(candidate,index+primary.length,state)).join('')}</div></details>`:''}<section class="controls"><h3>If no single candidate describes the result</h3><div class="outcomes">${[['clear_choice','There is a clear choice'],['equivalent','Equivalent'],['none_usable','None are usable'],['cannot_tell','I cannot tell']].map(([value,label])=>`<button data-outcome="${value}" class="${state.outcome?.value===value?'selected':''}">${label}</button>`).join('')}</div></section>`:'<p class="notice">No MIDI candidates were discovered for this role. Add a narrow <code>--candidate-root</code> or an explicit Workbench catalog.</p>'}<section class="setup"><h2>Next</h2><p>Mark one candidate as the main part, keep genuine alternatives optional, then use <b>Hear selected arrangement</b>. Rejected and needs-correction candidates are excluded from the arrangement and handoff.</p></section></section>`;wireStem(stem)}
    function candidateAudioUrl(candidate){return candidate.audition_blocked?null:(candidate.neutral_preview?.preview_url||candidate.preview_url||null)}
    function diagnosticDetails(diagnostics){if(!diagnostics)return'';const metrics=diagnostics.quality_metrics||{},boundaries=diagnostics.five_second_boundaries||{},blocked=!diagnostics.playable;return `<div class="diagnostics ${blocked?'blocked':''}"><b>${blocked?'Not a playable candidate: inspect only':'AI transcription diagnostics'}</b><br>Status: ${esc(diagnostics.quality_status)} · Notes: ${esc(diagnostics.note_count)} · Notes/s: ${esc(metrics.notes_per_second??'n/a')} · Duplicates: ${esc(metrics.duplicate_signature_ratio??'n/a')} · Max simultaneous: ${esc(metrics.maximum_simultaneous_notes??'n/a')}<br>Detected labels: ${esc((diagnostics.detected_labels||[]).join(', ')||'none')} · Requested: ${esc((diagnostics.requested_labels||[]).join(', ')||'unrestricted')}<br>Five-second boundaries: ${esc(boundaries.boundary_count??0)} · nearby onsets: ${esc(boundaries.onsets_within_80ms??0)} · elapsed/real-time factor: ${esc(diagnostics.elapsed_seconds??'n/a')}s / ${esc(diagnostics.real_time_factor??'n/a')}${blocked?`<br><b>Reason: ${esc((diagnostics.block_reasons||[]).join(', '))}</b>`:''}<br><span class="muted">These figures detect implausible output and label leakage; they do not score musical quality.</span></div>`}
    function candidateCard(candidate,index,state){const saved=state.candidates?.[candidate.candidate_id],activeMain=state.main_candidate_id===candidate.candidate_id,letter=String.fromCharCode(65+(index%26)),neutral=candidate.neutral_preview,audioUrl=candidateAudioUrl(candidate),blocked=!!candidate.audition_blocked;return `<article class="card ${saved?'chosen':''} ${blocked?'blocked':''}" data-card="${esc(candidate.candidate_id)}"><h3>Candidate ${letter}</h3>${audioUrl?`<audio id="audio-${esc(candidate.candidate_id)}" controls preload="metadata" src="${esc(audioUrl)}"></audio><p><span class="badge ${neutral?'good':''}">${neutral?'Neutral cached proxy':'Existing unnormalised preview'}</span></p>`:(blocked?`<p class="error"><b>Audition disabled:</b> this AI result has no playable notes or contains an extreme decoder burst. The original evidence remains downloadable for diagnosis.</p>`:`<p class="muted">No audio preview has been rendered yet.</p>`)}${!neutral&&!blocked?`<button class="primary render-preview" data-candidate="${esc(candidate.candidate_id)}">Render neutral preview</button>`:''}<p><a href="${esc(candidate.midi_url)}" download>Download original MIDI</a></p><details ${blocked?'open':''}><summary>Reveal description and technical details</summary><p><b>${esc(candidate.label)}</b></p><p>${esc(candidate.description)}</p><p class="muted">Process: ${esc(candidate.process)}<br>MIDI SHA-256: ${esc(candidate.midi.sha256.slice(0,16))}…<br>Existing preview policy: ${esc(candidate.preview_policy)}</p>${diagnosticDetails(candidate.ai_diagnostics)}${candidate.warnings?.length?`<p class="error">${candidate.warnings.map(esc).join('<br>')}</p>`:''}</details><h4>Use in this project</h4><div class="actions">${[['main','Use as main'],['optional','Keep optional'],['needs_correction','Needs correction'],['reject','Reject']].map(([value,label])=>`<button data-decision="${value}" data-candidate="${esc(candidate.candidate_id)}" class="${value==='main'?(activeMain?'selected':''):(saved?.decision===value?'selected':'')}" ${blocked&&(value==='main'||value==='optional')?'disabled title="Blocked by AI diagnostics"':''}>${label}</button>`).join('')}</div><details ${saved?.decision==='needs_correction'?'open':''}><summary>Problem details</summary><div class="problems">${[['missing_notes','Missing notes'],['extra_notes','Extra notes'],['wrong_pitch_or_octave','Wrong pitch/octave'],['starts_early_or_late','Starts early/late'],['ends_early_or_late','Ends early/late'],['mixed_roles','Melody/accompaniment mixed'],['poor_timing','Poor timing'],['none_match','None match what I hear']].map(([value,label])=>`<label><input type="checkbox" value="${value}" ${saved?.problem_tags?.includes(value)?'checked':''}> ${label}</label>`).join('')}</div><label>Private listening note<textarea rows="3">${esc(saved?.notes||'')}</textarea></label></details><p class="muted saved">${saved?`Saved: ${esc(saved.decision)} (${esc(saved.context)})${saved.decision==='main'&&!activeMain?' — superseded by a later main choice':''}`:''}</p></article>`}
    function loopBounds(){const start=Math.max(0,Number(document.querySelector('#loop-start')?.value||0)),raw=document.querySelector('#loop-end')?.value,end=raw?Number(raw):Infinity;return{start,end:end>start?end:Infinity}}
    function stopAudio(){document.querySelectorAll('audio').forEach(audio=>audio.pause());currentAudio=null;document.querySelectorAll('[data-switch]').forEach(button=>button.classList.remove('playing'))}
    function bindSharedAudio(audio){audio.onplay=()=>{document.querySelectorAll('audio').forEach(item=>{if(item!==audio)item.pause()});currentAudio=audio;document.querySelectorAll('[data-switch]').forEach(button=>button.classList.toggle('playing',button.dataset.switch===audio.id))};audio.ontimeupdate=()=>{playhead=audio.currentTime;const label=document.querySelector('#playhead');if(label)label.textContent=playhead.toFixed(2)+'s';const {start,end}=loopBounds();if(audio.currentTime>=end){audio.currentTime=start;playhead=start}};audio.onended=()=>{document.querySelectorAll('[data-switch]').forEach(button=>button.classList.remove('playing'));currentAudio=null}}
    function switchAudio(audio,button){if(!audio)return;document.querySelectorAll('audio').forEach(item=>item.pause());const {start}=loopBounds();let target=Math.max(start,playhead||start);if(Number.isFinite(audio.duration)&&target>=audio.duration)target=start;audio.currentTime=target;currentAudio=audio;button?.classList.add('playing');audio.play().catch(showError)}
    function wireStem(stem){document.querySelector('#save-role').onclick=()=>save({event_type:'role_tag',stem_id:stem.stem_id,role:document.querySelector('#role').value});document.querySelectorAll('audio').forEach(bindSharedAudio);document.querySelectorAll('[data-switch]').forEach(button=>button.onclick=async()=>{const audio=document.getElementById(button.dataset.switch);switchAudio(audio,button);if(button.dataset.switch.startsWith('audio-')){const candidateId=button.dataset.switch.slice(6);await save({event_type:'candidate_auditioned',stem_id:stem.stem_id,candidate_id:candidateId,context:'solo'},false)}});document.querySelector('#stop-audio').onclick=stopAudio;document.querySelectorAll('.render-preview').forEach(button=>button.onclick=()=>renderNeutralPreview(stem.stem_id,button.dataset.candidate,button));document.querySelectorAll('[data-decision]').forEach(button=>button.onclick=()=>{const card=button.closest('[data-card]'),tags=[...card.querySelectorAll('.problems input:checked')].map(input=>input.value);save({event_type:'candidate_decision',stem_id:stem.stem_id,candidate_id:button.dataset.candidate,decision:button.dataset.decision,context:'solo',problem_tags:tags,notes:card.querySelector('textarea').value})});document.querySelectorAll('[data-outcome]').forEach(button=>button.onclick=()=>save({event_type:'stem_outcome',stem_id:stem.stem_id,outcome:button.dataset.outcome,context:'solo'}))}
    async function renderNeutralPreview(stemId,candidateId,button){button.disabled=true;button.textContent='Rendering locally…';try{await api('/api/render-preview',{method:'POST',body:JSON.stringify({stem_id:stemId,candidate_id:candidateId})});await refreshProject();render()}catch(error){button.disabled=false;button.textContent='Render neutral preview';showError(error)}}
    function renderArrangement(){const rows=selectedRows();document.querySelector('#main').innerHTML=setupText()+`<section class="panel"><h2>3. Hear the current arrangement</h2><p>This mix contains only the active explicit <b>main</b> choice and explicit <b>optional</b> choices shown below. Rejected, needs-correction and unreviewed MIDI are excluded.</p>${rows.length?`<table><thead><tr><th>Stem</th><th>Decision</th><th>Candidate</th><th>After hearing the mix</th></tr></thead><tbody>${rows.map(row=>{const saved=stateFor(row.stem).candidates?.[row.candidate.candidate_id]||{};return `<tr><td>${esc(stateFor(row.stem).role||row.stem.role)}</td><td>${esc(row.decision)}</td><td>${esc(row.candidate.label)}</td><td class="actions"><button data-mix-stem="${esc(row.stem.stem_id)}" data-mix-candidate="${esc(row.candidate.candidate_id)}" data-mix-decision="${esc(row.decision)}">Confirm ${esc(row.decision)}</button><button data-mix-stem="${esc(row.stem.stem_id)}" data-mix-candidate="${esc(row.candidate.candidate_id)}" data-mix-decision="needs_correction">Needs correction</button><button data-mix-stem="${esc(row.stem.stem_id)}" data-mix-candidate="${esc(row.candidate.candidate_id)}" data-mix-decision="reject">Reject</button><span hidden data-existing-tags="${esc(JSON.stringify(saved.problem_tags||[]))}" data-existing-notes="${esc(saved.notes||'')}"></span></td></tr>`}).join('')}</tbody></table>`:'<p class="notice">No parts are selected yet. Choose at least one main or optional candidate.</p>'}<button id="render-arrangement" class="primary" ${rows.length?'':'disabled'}>${project.arrangement?'Rebuild or reuse current arrangement':'Render current arrangement'}</button><div id="arrangement-result">${arrangementPlayer(project.arrangement)}</div><p class="muted">This is a dry role-neutral GM proxy for judging whether parts work together. The original MIDI files remain unchanged and are the authoritative GarageBand tracks. The confirmation buttons record that you judged a choice in full-mix context.</p></section>`;const button=document.querySelector('#render-arrangement');if(button&&!button.disabled)button.onclick=async()=>{button.disabled=true;button.textContent='Rendering selected mix locally…';try{const response=await api('/api/arrangement',{method:'POST',body:'{}'});project.arrangement=response.arrangement;document.querySelector('#arrangement-result').innerHTML=arrangementPlayer(project.arrangement);wireArrangementPlayer();button.disabled=false;button.textContent='Rebuild or reuse current arrangement'}catch(error){button.disabled=false;button.textContent='Render current arrangement';showError(error)}};document.querySelectorAll('[data-mix-decision]').forEach(mixButton=>mixButton.onclick=()=>{const holder=mixButton.parentElement.querySelector('[data-existing-tags]');save({event_type:'candidate_decision',stem_id:mixButton.dataset.mixStem,candidate_id:mixButton.dataset.mixCandidate,decision:mixButton.dataset.mixDecision,context:'full_mix',problem_tags:JSON.parse(holder.dataset.existingTags),notes:holder.dataset.existingNotes})});wireArrangementPlayer()}
    function arrangementPlayer(arrangement){return arrangement?`<div class="success"><p><b>Selected arrangement ready</b>${arrangement.cache_hit?' · reused verified cache':''}</p><audio id="arrangement-audio" controls preload="metadata" src="${esc(arrangement.preview_url)}"></audio><p><a href="${esc(arrangement.midi_url)}" download>Download arrangement proxy MIDI</a></p></div>`:''}
    function wireArrangementPlayer(){const audio=document.querySelector('#arrangement-audio');if(audio)audio.onplay=()=>{currentAudio=audio}}
    function renderExport(){const rows=selectedRows();document.querySelector('#main').innerHTML=setupText()+`<section class="panel"><h2>5. Export to GarageBand</h2><p>The handoff ZIP contains byte-for-byte copies of only your ${rows.length} explicit main/optional MIDI choice${rows.length===1?'':'s'}, a convenience arrangement proxy, its WAV audition and path-free instructions/manifest. It does not contain source audio or private notes.</p>${rows.length?`<ul>${rows.map(row=>`<li><b>${esc(stateFor(row.stem).role||row.stem.role)}</b>: ${esc(row.candidate.label)} (${esc(row.decision)})</li>`).join('')}</ul>`:'<p class="notice">Choose at least one main or optional candidate first.</p>'}<button id="build-handoff" class="primary" ${rows.length?'':'disabled'}>Build GarageBand handoff</button><div id="handoff-result"></div><hr><p><a href="${esc(project.review_url)}">Download full private review JSON</a> — includes local paths and private listening notes for your records.</p></section>`;const button=document.querySelector('#build-handoff');if(button&&!button.disabled)button.onclick=async()=>{button.disabled=true;button.textContent='Building verified local ZIP…';try{const response=await api('/api/garageband-export',{method:'POST',body:'{}'}),handoff=response.handoff;document.querySelector('#handoff-result').innerHTML=`<p class="success"><b>Handoff ready.</b> <a href="${esc(handoff.zip_url)}" download>Download GarageBand handoff ZIP</a>${handoff.cache_hit?' (verified cache reused)':''}</p>`;button.disabled=false;button.textContent='Build or reuse GarageBand handoff'}catch(error){button.disabled=false;button.textContent='Build GarageBand handoff';showError(error)}}}
    async function save(event,rerender=true){try{const before=selectedRows().map(row=>row.candidate.candidate_id+':'+row.decision).join('|'),response=await api('/api/events',{method:'POST',body:JSON.stringify(event)});project.state=response.state;const after=selectedRows().map(row=>row.candidate.candidate_id+':'+row.decision).join('|');if(before!==after)project.arrangement=null;if(rerender)render();else renderNav()}catch(error){showError(error)}}
    async function refreshProject(){project=await api('/api/project');document.querySelector('#review-export').href=project.review_url}
    function showError(error){const main=document.querySelector('#main');main.insertAdjacentHTML('afterbegin',`<p class="error">${esc(error.message||error)}</p>`)}
    document.querySelector('#arrangement-nav').onclick=()=>{view='arrangement';render()};document.querySelector('#export-nav').onclick=()=>{view='export';render()};document.querySelector('#review-export').onclick=event=>{event.preventDefault();location.href=`/api/review?token=${encodeURIComponent(token)}`};document.querySelector('#preview-share').onclick=()=>{if(!project)return;view='contribution';stopAudio();renderNav();document.querySelector('#main').innerHTML=`<section class="preview"><h2>Possible contribution — disabled</h2><p>No submission endpoint exists. If a later opt-in is enabled, these are the exact metadata-only fields proposed to leave this machine:</p><pre>${esc(JSON.stringify(project.contribution_preview,null,2))}</pre><button class="primary" id="back">Back to project</button></section>`;document.querySelector('#back').onclick=()=>{view='stem';render()}};
    refreshProject().then(()=>{activeStem=(project.stems.find(stem=>stem.candidate_count)||project.stems[0])?.stem_id;render()}).catch(showError);
  </script>
</body>
</html>
